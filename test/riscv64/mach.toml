[project]
id = "rvprobe"
version = "0.0.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[profile.debug]
opt = 0
debug = true
simd = "scalarize"

[artifact.rvprobe]
kind = "bin"
entry = "main.mach"
out = "bin/rvprobe"
targets = ["*"]
link = []
need = []

[dep.std]
path = "dep/std"
