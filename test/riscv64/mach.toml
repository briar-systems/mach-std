[project]
id = "rvprobe"
name = "rvprobe"
description = "RISCV64 probe test"
version = "0.0.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[profile.debug]
opt = 0

[artifact.rvprobe]
kind = "bin"
entry = "main.mach"
out = "bin/rvprobe"
targets = ["*"]

[dep.std]
path = "dep/std"
