[project]
id      = "relroprobe"
name    = "relroprobe"
version = "0.0.0"
src     = "src"
dep     = "dep"
target  = "linux"
out     = "out/{target}/{name}{ext}"
obj     = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[profile.debug]
opt = 0

[bin.relro_happy]
entry = "happy.mach"

[bin.relro_fault]
entry = "fault.mach"

[deps.std]
path = "dep/std"
